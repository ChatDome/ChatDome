# SSH & Authentication — SSH 登录安全与认证审计
pack:
  name: "SSH & Authentication"
  description: "SSH 登录安全与认证审计"
  version: "1.0"

commands:
  ssh_bruteforce:
    name: "SSH 暴力破解检测"
    templates:
      - platform: linux
        command: >-
          (if [ -f /var/log/auth.log ]; then
          awk '/Failed password/ {print $(NF-3)}' /var/log/auth.log;
          elif [ -f /var/log/secure ]; then
          awk '/Failed password/ {print $(NF-3)}' /var/log/secure;
          else echo 'No SSH auth log found'; fi) | sort | uniq -c | sort -nr | head -{limit}
        requires: [awk, sort, uniq, head]
    params:
      limit: { type: int, default: 10, max: 50 }
    timeout: 10
    tags: [ssh, bruteforce, credential_access]

  ssh_failed_burst:
    name: "SSH 短时多次失败登录检测"
    templates:
      - platform: linux
        command: >-
          (if command -v journalctl >/dev/null 2>&1; then
          journalctl --since '-{minutes} min' --no-pager 2>/dev/null | grep 'Failed password' || true;
          elif [ -f /var/log/auth.log ]; then
          grep 'Failed password' /var/log/auth.log | tail -{fallback_limit} || true;
          elif [ -f /var/log/secure ]; then
          grep 'Failed password' /var/log/secure | tail -{fallback_limit} || true;
          fi) | tail -{max_lines}
        requires: [grep, tail]
    params:
      minutes: { type: int, default: 5, max: 120 }
      fallback_limit: { type: int, default: 3000, max: 20000 }
      max_lines: { type: int, default: 2000, max: 20000 }
    timeout: 15
    tags: [ssh, bruteforce, burst, credential_access]

  auditd_status:
    name: "auditd 审计状态检测"
    templates:
      - platform: linux
        command: >-
          (echo "=== auditd installed ===";
          if command -v auditctl >/dev/null 2>&1; then
            echo "YES";
            echo "";
            echo "=== auditd service status ===";
            systemctl is-active auditd 2>/dev/null || service auditd status 2>/dev/null | head -1 || echo "unknown";
            echo "";
            echo "=== execve rules ===";
            auditctl -l 2>/dev/null | grep -i execve || echo "No execve rules found";
            echo "";
            echo "=== audit stats ===";
            auditctl -s 2>/dev/null | head -10;
          else
            echo "NO";
            echo "";
            echo "auditd is NOT installed.";
            echo "To enable SSH session command tracking, install auditd:";
            if command -v apt-get >/dev/null 2>&1; then
              echo "  sudo apt-get install -y auditd audispd-plugins";
            elif command -v dnf >/dev/null 2>&1; then
              echo "  sudo dnf install -y audit";
            elif command -v yum >/dev/null 2>&1; then
              echo "  sudo yum install -y audit";
            fi;
          fi)
        requires: []
    params: {}
    timeout: 10
    tags: [audit, configuration, infrastructure]

  ssh_success_login:
    name: "SSH 成功登录记录"
    templates:
      - platform: linux
        command: >-
          (OUT="";
          if command -v journalctl >/dev/null 2>&1; then
            OUT=$(journalctl -u ssh -u sshd --since '-24 hours' --no-pager 2>/dev/null | grep -E 'sshd.*Accepted (password|publickey|keyboard-interactive|hostbased|gssapi-with-mic|certificate)' || true);
          fi;
          if [ -z "$OUT" ] && [ -r /var/log/auth.log ]; then
            OUT=$(tail -{fallback_limit} /var/log/auth.log 2>/dev/null | awk -v since_hours=24 'BEGIN {now=systime(); cutoff=now-(since_hours*3600); current_year=strftime("%Y", now); current_month=strftime("%m", now)+0; split("Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec", names, " "); for (i=1; i<=12; i++) mon[names[i]]=i} function line_epoch(mon_name, day, clock, parts, month_num, year_value, ts) {month_num=mon[mon_name]+0; if (!month_num) return 0; split(clock, parts, ":"); if (length(parts[1]) == 0 || length(parts[2]) == 0 || length(parts[3]) == 0) return 0; year_value=current_year; if (month_num > current_month + 6) year_value--; ts=mktime(sprintf("%d %d %d %d %d %d", year_value, month_num, day, parts[1], parts[2], parts[3])); return ts} $0 ~ /sshd.*Accepted (password|publickey|keyboard-interactive|hostbased|gssapi-with-mic|certificate)/ {ts=line_epoch($1, $2, $3); if (ts >= cutoff) print}' || true);
          fi;
          if [ -z "$OUT" ] && [ -r /var/log/secure ]; then
            OUT=$(tail -{fallback_limit} /var/log/secure 2>/dev/null | awk -v since_hours=24 'BEGIN {now=systime(); cutoff=now-(since_hours*3600); current_year=strftime("%Y", now); current_month=strftime("%m", now)+0; split("Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec", names, " "); for (i=1; i<=12; i++) mon[names[i]]=i} function line_epoch(mon_name, day, clock, parts, month_num, year_value, ts) {month_num=mon[mon_name]+0; if (!month_num) return 0; split(clock, parts, ":"); if (length(parts[1]) == 0 || length(parts[2]) == 0 || length(parts[3]) == 0) return 0; year_value=current_year; if (month_num > current_month + 6) year_value--; ts=mktime(sprintf("%d %d %d %d %d %d", year_value, month_num, day, parts[1], parts[2], parts[3])); return ts} $0 ~ /sshd.*Accepted (password|publickey|keyboard-interactive|hostbased|gssapi-with-mic|certificate)/ {ts=line_epoch($1, $2, $3); if (ts >= cutoff) print}' || true);
          fi;
          if [ -z "$OUT" ] && command -v last >/dev/null 2>&1; then
            LAST_OUT=$(last -i -F -n {last_limit} 2>/dev/null);
            if [ -z "$LAST_OUT" ]; then LAST_OUT=$(last -i -n {last_limit} 2>/dev/null); fi;
            OUT=$(printf '%s\n' "$LAST_OUT" | awk -v since_hours=24 'BEGIN {now=systime(); cutoff=now-(since_hours*3600); current_year=strftime("%Y", now); current_month=strftime("%m", now)+0; split("Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec", names, " "); for (i=1; i<=12; i++) mon[names[i]]=i} function last_epoch(mon_name, day, clock, year_value, parts, month_num, ts) {month_num=mon[mon_name]+0; if (!month_num) return 0; split(clock, parts, ":"); if (length(parts[1]) == 0 || length(parts[2]) == 0 || length(parts[3]) == 0) return 0; if (year_value !~ /^[0-9][0-9][0-9][0-9]$/) {year_value=current_year; if (month_num > current_month + 6) year_value--} ts=mktime(sprintf("%d %d %d %d %d %d", year_value, month_num, day, parts[1], parts[2], parts[3])); return ts} {ip_ok=(($3 ~ /^[0-9.]+$/ && $3 ~ /\./) || ($3 !~ /^:/ && $3 ~ /^[0-9A-Fa-f:.]+$/ && $3 ~ /:/)); if ($1!="reboot" && $1!="wtmp" && $1!="btmp" && NF>=7 && ip_ok) {year=($8 ~ /^[0-9][0-9][0-9][0-9]$/ ? $8 : current_year); ts=last_epoch($5, $6, $7, year); if (ts >= cutoff) rows[++n]=$5 " " $6 " " $7 " " year " " $1 " " $3 " 22 last"}} END {for (i=n; i>=1; i--) print rows[i]}' || true);
          fi;
          if [ -n "$OUT" ]; then
            printf '%s\n' "$OUT";
          else
            echo 'No SSH successful login records found or log access denied';
          fi) | awk '{
              method=""; user=""; ip=""; port=""; pid="";
              if (match($0, /sshd\[[0-9][0-9]*\]/)) pid=substr($0, RSTART+5, RLENGTH-6);
              for (i=1; i<=NF; i++) {
                if ($i=="Accepted" && (i+1)<=NF) method=$(i+1);
                if ($i=="for" && (i+1)<=NF) user=$(i+1);
                if ($i=="from" && (i+1)<=NF) ip=$(i+1);
                if ($i=="port" && (i+1)<=NF) port=$(i+1);
              }
              if (user!="" && ip!="") {
                if (port=="") port="22";
                if (method=="") method="unknown";
                if (pid!="") print $1, $2, $3, user, ip, port, method, "sshd_pid=" pid;
                else print $1, $2, $3, user, ip, port, method;
              }
              else print $0;
            }' | tail -{limit}
        requires: [grep, awk, tail]
    params:
      limit: { type: int, default: 20, max: 100 }
      fallback_limit: { type: int, default: 3000, max: 20000 }
      last_limit: { type: int, default: 200, max: 5000 }
    timeout: 10
    tags: [ssh, login, initial_access]

  ssh_success_login_offhours:
    name: "SSH 异常时段成功登录"
    templates:
      - platform: linux
        command: >-
          (OUT="";
          if command -v journalctl >/dev/null 2>&1; then
            OUT=$(journalctl -u ssh -u sshd --since '-{since_hours} hours' --no-pager 2>/dev/null | grep -E 'sshd.*Accepted (password|publickey|keyboard-interactive|hostbased|gssapi-with-mic|certificate)' || true);
          fi;
          if [ -z "$OUT" ] && [ -r /var/log/auth.log ]; then
            OUT=$(tail -{fallback_limit} /var/log/auth.log 2>/dev/null | awk -v since_hours={since_hours} 'BEGIN {now=systime(); cutoff=now-(since_hours*3600); current_year=strftime("%Y", now); current_month=strftime("%m", now)+0; split("Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec", names, " "); for (i=1; i<=12; i++) mon[names[i]]=i} function line_epoch(mon_name, day, clock, parts, month_num, year_value, ts) {month_num=mon[mon_name]+0; if (!month_num) return 0; split(clock, parts, ":"); if (length(parts[1]) == 0 || length(parts[2]) == 0 || length(parts[3]) == 0) return 0; year_value=current_year; if (month_num > current_month + 6) year_value--; ts=mktime(sprintf("%d %d %d %d %d %d", year_value, month_num, day, parts[1], parts[2], parts[3])); return ts} $0 ~ /sshd.*Accepted (password|publickey|keyboard-interactive|hostbased|gssapi-with-mic|certificate)/ {ts=line_epoch($1, $2, $3); if (ts >= cutoff) print}' || true);
          fi;
          if [ -z "$OUT" ] && [ -r /var/log/secure ]; then
            OUT=$(tail -{fallback_limit} /var/log/secure 2>/dev/null | awk -v since_hours={since_hours} 'BEGIN {now=systime(); cutoff=now-(since_hours*3600); current_year=strftime("%Y", now); current_month=strftime("%m", now)+0; split("Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec", names, " "); for (i=1; i<=12; i++) mon[names[i]]=i} function line_epoch(mon_name, day, clock, parts, month_num, year_value, ts) {month_num=mon[mon_name]+0; if (!month_num) return 0; split(clock, parts, ":"); if (length(parts[1]) == 0 || length(parts[2]) == 0 || length(parts[3]) == 0) return 0; year_value=current_year; if (month_num > current_month + 6) year_value--; ts=mktime(sprintf("%d %d %d %d %d %d", year_value, month_num, day, parts[1], parts[2], parts[3])); return ts} $0 ~ /sshd.*Accepted (password|publickey|keyboard-interactive|hostbased|gssapi-with-mic|certificate)/ {ts=line_epoch($1, $2, $3); if (ts >= cutoff) print}' || true);
          fi;
          if [ -z "$OUT" ] && command -v last >/dev/null 2>&1; then
            LAST_OUT=$(last -i -F -n {last_limit} 2>/dev/null);
            if [ -z "$LAST_OUT" ]; then LAST_OUT=$(last -i -n {last_limit} 2>/dev/null); fi;
            OUT=$(printf '%s\n' "$LAST_OUT" | awk -v since_hours={since_hours} 'BEGIN {now=systime(); cutoff=now-(since_hours*3600); current_year=strftime("%Y", now); current_month=strftime("%m", now)+0; split("Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec", names, " "); for (i=1; i<=12; i++) mon[names[i]]=i} function last_epoch(mon_name, day, clock, year_value, parts, month_num, ts) {month_num=mon[mon_name]+0; if (!month_num) return 0; split(clock, parts, ":"); if (length(parts[1]) == 0 || length(parts[2]) == 0 || length(parts[3]) == 0) return 0; if (year_value !~ /^[0-9][0-9][0-9][0-9]$/) {year_value=current_year; if (month_num > current_month + 6) year_value--} ts=mktime(sprintf("%d %d %d %d %d %d", year_value, month_num, day, parts[1], parts[2], parts[3])); return ts} {ip_ok=(($3 ~ /^[0-9.]+$/ && $3 ~ /\./) || ($3 !~ /^:/ && $3 ~ /^[0-9A-Fa-f:.]+$/ && $3 ~ /:/)); if ($1!="reboot" && $1!="wtmp" && $1!="btmp" && NF>=7 && ip_ok) {year=($8 ~ /^[0-9][0-9][0-9][0-9]$/ ? $8 : current_year); ts=last_epoch($5, $6, $7, year); if (ts >= cutoff) rows[++n]=$5 " " $6 " " $7 " " year " " $1 " " $3 " 22 last"}} END {for (i=n; i>=1; i--) print rows[i]}' || true);
          fi;
          if [ -n "$OUT" ]; then
            printf '%s\n' "$OUT";
          else
            echo 'No SSH successful login records found or log access denied';
          fi) | awk -v start={work_start_hour} -v end={work_end_hour} '{
              split($3, t, ":");
              h = t[1] + 0;
              # abnormal = outside [start, end)
              if (h < start || h >= end) {
                method=""; user=""; ip=""; port=""; pid="";
                if (match($0, /sshd\[[0-9][0-9]*\]/)) pid=substr($0, RSTART+5, RLENGTH-6);
                for (i=1; i<=NF; i++) {
                  if ($i=="Accepted" && (i+1)<=NF) method=$(i+1);
                  if ($i=="for" && (i+1)<=NF) user=$(i+1);
                  if ($i=="from" && (i+1)<=NF) ip=$(i+1);
                  if ($i=="port" && (i+1)<=NF) port=$(i+1);
                }
                if (user!="" && ip!="") {
                  if (port=="") port="22";
                  if (method=="") method="unknown";
                  if (pid!="") print $1, $2, $3, user, ip, port, method, "sshd_pid=" pid;
                  else print $1, $2, $3, user, ip, port, method;
                }
                else print $0;
              }
            }' | tail -{limit}
        requires: [grep, awk, tail]
    params:
      since_hours: { type: int, default: 24, max: 168 }
      fallback_limit: { type: int, default: 3000, max: 20000 }
      work_start_hour: { type: int, default: 8, max: 23 }
      work_end_hour: { type: int, default: 23, max: 24 }
      limit: { type: int, default: 200, max: 5000 }
      last_limit: { type: int, default: 500, max: 5000 }
    timeout: 15
    tags: [ssh, login, offhours, anomaly_detection]

  ssh_audit_session_for_pid:
    name: "SSH audit session ID 查询"
    templates:
      - platform: linux
        command: >-
          (if ! command -v ausearch >/dev/null 2>&1; then
            echo "AUDITD_NOT_AVAILABLE";
            exit 0;
          fi;
          for child in $(pgrep -P {sshd_pid} 2>/dev/null); do
            ses=$(cat /proc/$child/sessionid 2>/dev/null);
            if [ -n "$ses" ] && [ "$ses" != "4294967295" ]; then
              echo "ses=$ses";
              exit 0;
            fi;
          done;
          ausearch -p {sshd_pid} -i 2>/dev/null | grep -Eo 'ses=[0-9]+' | head -1 | grep . && exit 0;
          PPID_VAL=$(ps -o ppid= -p {sshd_pid} 2>/dev/null | tr -d ' ');
          if [ -n "$PPID_VAL" ]; then
            ausearch -p $PPID_VAL -i 2>/dev/null | grep -Eo 'ses=[0-9]+' | head -1 | grep . && exit 0;
          fi
          ) 2>/dev/null || true
        requires: [ausearch, grep, head, pgrep, cat, ps]
    params:
      sshd_pid: { type: str, default: "0" }
    timeout: 10
    tags: [ssh, session, audit, auditd]

  ssh_session_commands:
    name: "SSH 会话命令追踪"
    templates:
      - platform: linux
        command: >-
          (if ! command -v ausearch >/dev/null 2>&1; then
            echo "AUDITD_NOT_AVAILABLE";
            exit 0;
          fi;
          ausearch -sc execve --session {session_id} -i 2>/dev/null
            | grep 'type=EXECVE'
            | awk -F'"' '{cmd=""; for(i=2;i<=NF;i+=2) cmd=cmd $i " "; gsub(/^ +| +$/, "", cmd); if(cmd!="") print cmd}'
            | tail -{limit}
          ) 2>/dev/null || echo "ausearch failed"
        requires: [ausearch, grep, awk, tail]
    params:
      session_id: { type: str, default: "0" }
      limit: { type: int, default: 50, max: 200 }
    timeout: 15
    tags: [ssh, post_login, command_history, execution, auditd]

  ssh_active_sessions:
    name: "SSH 活跃会话列表"
    templates:
      - platform: linux
        command: >-
          (echo "=== Active SSH Sessions ===";
          w -hi 2>/dev/null | awk '{print "user=" $1, "tty=" $2, "from=" $3, "idle=" $4, "cmd=" $8}';
          echo "";
          echo "=== sshd Session PIDs ===";
          ps -eo pid,ppid,user,lstart,args 2>/dev/null
            | grep 'sshd:.*@'
            | grep -v grep
            | head -{limit};
          echo "";
          echo "=== Audit Session Mapping ===";
          if command -v ausearch >/dev/null 2>&1; then
            ausearch -m USER_LOGIN --start today -i 2>/dev/null
              | grep -E '(ses=|acct=|addr=)'
              | tail -{limit};
          else
            echo "auditd not available";
          fi)
        requires: [ps, w]
    params:
      limit: { type: int, default: 20, max: 50 }
    timeout: 10
    tags: [ssh, session, active, audit]

  failed_sudo:
    name: "sudo 失败记录"
    templates:
      - platform: linux
        command: >-
          (if [ -f /var/log/auth.log ]; then
          grep 'sudo:.*COMMAND' /var/log/auth.log | grep 'NOT';
          elif [ -f /var/log/secure ]; then
          grep 'sudo:.*COMMAND' /var/log/secure | grep 'NOT';
          else echo 'No sudo log found'; fi) | tail -{limit}
        requires: [grep, tail]
    params:
      limit: { type: int, default: 20, max: 100 }
    timeout: 10
    tags: [sudo, privilege_escalation]

  ssh_authorized_keys:
    name: "SSH 公钥变更检测"
    templates:
      - platform: linux
        command: "find /home -name authorized_keys -exec md5sum {} \\;"
        requires: [find, md5sum]
    params: {}
    timeout: 10
    tags: [ssh, persistence, file_integrity]

  sudoers_changes:
    name: "sudoers 文件变更"
    templates:
      - platform: linux
        command: "ls -la /etc/sudoers /etc/sudoers.d/ 2>/dev/null && md5sum /etc/sudoers 2>/dev/null"
        requires: [ls, md5sum]
    params: {}
    timeout: 10
    tags: [sudo, persistence, privilege_escalation]
