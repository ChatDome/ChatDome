# ChatDome Configuration
#
# This file contains NON-SENSITIVE settings only.
# All sensitive parameters (tokens, API keys) MUST be configured
# via environment variables 鈥?see README for details.
#
# Required environment variables:
#   CHATDOME_BOT_TOKEN        鈥?Telegram Bot token
#   CHATDOME_AI_API_KEY       鈥?LLM API key
#
# Optional environment variables:
#   CHATDOME_AI_PROVIDER      鈥?LLM provider id (default: openai)
#   CHATDOME_AI_API_MODE      鈥?Adapter mode: openai_api or codex_responses
#   CHATDOME_AI_BASE_URL      鈥?LLM API base URL (default: https://api.openai.com/v1)
#   CHATDOME_AI_MODEL         鈥?LLM model name (default: gpt-4o)
#   CHATDOME_CODEX_CLIENT_ID  — OpenAI Codex Client ID
#   CHATDOME_CODEX_TOKEN_FILE — Path to save Codex OAuth tokens
#   CHATDOME_CODEX_BASE_URL   — Codex API base URL
#   CHATDOME_ALLOWED_CHAT_IDS 鈥?Comma-separated Telegram Chat IDs (e.g. "123,456")

chatdome:
  telegram:
    # allowed_chat_ids: set via CHATDOME_ALLOWED_CHAT_IDS env var
    max_message_length: 4000

  ai:
    # provider/api_mode are a pair:
    #   openai + openai_api: uses OpenAI-compatible Chat Completions API + API key
    #   codex + codex_responses: uses locally authenticated Codex CLI, no API key required here
    provider: "openai"
    api_mode: "openai_api"
    # base_url: set via CHATDOME_AI_BASE_URL env var, or override here
    # base_url: "https://api.openai.com/v1"
    model: "gpt-4o"
    temperature: 0.1
    max_tokens: 2000

        # Codex native OAuth settings.
        # Users can complete login via the Telegram command /codex_login.
    codex_client_id: ""
    codex_token_file: ""
    codex_base_url: "https://chatgpt.com/backend-api/codex"

  agent:
    # -------------------------------------------------------------------------
    # allow_generated_commands: The "Infinite Possibilities" Switch
    # -------------------------------------------------------------------------
    # When `false`: Restricted mode. ChatDome can ONLY use predefined
    #   safety audit commands from the loaded Command Packs.
    # When `true` (current default): Unlocks flexible host inspection. The LLM can dynamically
    #   write shell commands to fulfill your prompt (e.g. `ls`, `du`, `find`).
    #
    # Safety flow: dynamic commands are reviewed before execution. In restricted mode they
    #   still pass through the read-only validator and approval flow; if unrestricted mode is
    #   also enabled, static-safe read-only commands may run automatically, while risky,
    #   mutating, or deleting commands enter Human-in-the-loop confirmation.
    # -------------------------------------------------------------------------
    allow_generated_commands: true

    # -------------------------------------------------------------------------
    # allow_unrestricted_commands: The "God Mode" Switch
    # -------------------------------------------------------------------------
    # When `false`: AI-generated commands go through the safety
    #   validator (dangerous pattern blocklist + read-only allowlist).
    # When `true` (current default): Bypasses the command validator 鈥?no blocklist,
    #   no allowlist at the sandbox validation layer.
    #
    # 鈿狅笍  WARNING: This is extremely dangerous. Only enable this if you fully
    #   trust the deployment context and understand the risks. The ToolDispatcher still
    #   performs a pre-execution review and sends risky/mutating/deleting commands to
    #   approval, but unrestricted execution removes the deterministic validator guardrail.
    #   This implicitly enables generated commands as well.
    # -------------------------------------------------------------------------
    allow_unrestricted_commands: true

    session_timeout: 600
    # Pending approval stage timeout (seconds). Keep this longer than
    # session_timeout so users can ask follow-up questions before deciding.
    pending_approval_timeout: 86400
    # Persisted session retention TTL (seconds). Memory sessions can expire
    # quickly, but context snapshots remain restorable until this TTL.
    # Set 0 to disable TTL cleanup for persisted snapshots.
    persisted_session_ttl: 604800
    max_rounds_per_turn: 10
    max_history_tokens: 16000
    command_timeout: 10
    max_output_chars: 4000

  # ---------------------------------------------------------------------------
  # Sentinel 鈥?7脳24 Security Monitoring (鍝ㄥ叺妯″紡)
  # ---------------------------------------------------------------------------
  sentinel:
    enabled: true                         # 鍝ㄥ叺妯″紡寮€鍏?

    # 鍛婅鎺ㄩ€佺洰鏍囷紙绌?= 浣跨敤 telegram.allowed_chat_ids锛涘鏋滀袱鑰呴兘涓虹┖锛屽垯 Sentinel 鍙贰妫€/璁板綍锛屼笉浼氫富鍔ㄦ帹閫佸埌鎵嬫満锛?    # 杩愯鏃跺彲鍦?Telegram 涓敤鑷劧璇█鎴?/sentinel_mute銆?sentinel_resume 鏆傚仠/鎭㈠鎺ㄩ€侊紱
    # 闈欓粯鐘舵€佷繚瀛樺湪 chat_data/sentinel_alert_push_state.json锛屼笉褰卞搷宸℃鍜屽巻鍙茶褰曘€?    alert_chat_ids: []
    alert_retention_days: 30             # sentinel_alerts.jsonl 鎸夊ぉ淇濈暀绐楀彛

    # 鎺?鎷夊垎绂?鈥?鎺ㄩ€佺瓥鐣?
    push_min_severity: 7                   # 鏁板€?鈮?7 (high) 鎵嶄富鍔ㄦ帹閫?Telegram
                                           # 浣庝簬姝ょ骇鍒殑鍛婅闈欓粯璁板綍锛岀敤鎴烽€氳繃 /sentinel_status 鏌ョ湅

    # 鍛戒护搴?
    builtin_packs:                         # 鍚敤鐨勫唴缃?pack锛堢渷鐣?= 鍏ㄩ儴鍔犺浇锛?
      - ssh_auth
      - network
      - system_resources
      - processes_services
      - logs
      # - users_permissions                # 鎸夐渶鍚敤
      # - file_integrity
      # - containers
    # custom_packs_dir: "./packs"          # 鐢ㄦ埛鑷畾涔?pack 鐩綍

    # 鍛婅闃叉姢
    global_rate_limit: 10                  # 鍏ㄥ眬閫熺巼闄愬埗锛氭瘡绐楀彛鏈€澶氭帹閫?N 鏉?
    global_rate_window: 300                # 閫熺巼绐楀彛澶у皬锛堢锛?
    learning_rounds: 1                     # 鍐峰惎鍔ㄩ潤榛樿疆鏁帮紙棣栨鍚姩寤哄熀绾匡級

    # 妫€鏌ョ瓥鐣ュ垪琛?
    checks:
      - name: "SSH 鏂拌闂潵婧愭娴?
        check_id: ssh_bruteforce
        interval: 300
        mode: differential
        severity: 6                        # medium锛堜繚鐣欐鏌ワ紝涓嶄富鍔ㄦ帹閫侊級
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "SSH 鐭椂澶氭澶辫触鐧诲綍鍛婅锛?鍒嗛挓锛?
        check_id: ssh_failed_burst
        interval: 60
        mode: snapshot
        args:
          minutes: 3
          fallback_limit: 1000
          max_lines: 500
        severity: 8                        # high
        rule:
          type: line_count
          operator: ">="
          threshold: 10                    # 3 鍒嗛挓鍐呭け璐?>= 10 娆¤Е鍙?

      - name: "SSH 鎸佺画澶辫触鐧诲綍鍛婅锛?灏忔椂锛?
        check_id: ssh_failed_burst
        interval: 300
        mode: snapshot
        args:
          minutes: 60
          fallback_limit: 5000
          max_lines: 1000
        severity: 7                        # high
        rule:
          type: line_count
          operator: ">="
          threshold: 15                    # 1 灏忔椂鍐呭け璐?>= 15 娆¤Е鍙?

      - name: "SSH 鎴愬姛鐧诲綍鍛婅"
        check_id: ssh_success_login
        interval: 60
        mode: differential
        args:
          limit: 200
        severity: 9                        # critical
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "SSH 寮傚父鏃舵鎴愬姛鐧诲綍鍛婅"
        check_id: ssh_success_login_offhours
        interval: 60
        mode: differential
        args:
          since_hours: 24
          fallback_limit: 3000
          work_start_hour: 8               # 姝ｅ父鏃舵璧峰锛堝惈锛?
          work_end_hour: 23                # 姝ｅ父鏃舵缁撴潫锛堜笉鍚級
          limit: 200
        severity: 8                        # high
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "SSH 浼氳瘽鍛戒护宸℃"
        check_id: ssh_session_commands_patrol
        interval: 900                    # 姣?15 鍒嗛挓杩借釜娲昏穬 SSH 浼氳瘽鍛戒护澧為噺
        mode: differential
        args:
          tracking_window_hours: 1        # 浠呬富鍔ㄨ拷韪櫥褰曞悗 1 灏忔椂鍐呯殑浼氳瘽
          limit: 50
        severity: 7                       # high
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "纾佺洏浣跨敤鐜?
        check_id: disk_usage
        interval: 600
        mode: snapshot
        severity: 4                        # low
        rule:
          type: regex_extract
          pattern: '(\d+)%'
          aggregation: max
          operator: ">"
          threshold: 85

      - name: "鏂板鐩戝惉绔彛"
        check_id: open_ports
        interval: 120
        mode: differential
        severity: 9                        # critical
        rule:
          type: line_count
          operator: ">"
          threshold: 0

