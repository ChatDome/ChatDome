# ChatDome Configuration
#
# Copy this file to config.yaml and fill in local secrets there.
# config.yaml is ignored by Git and should be kept owner-readable only
# (chmod 600 on Linux). New Codex OAuth profiles use profile-scoped
# token files under ~/.chatdome/codex-auth/.

chatdome:
  telegram:
    bot_token: ""
    allowed_chat_ids: []
    proxy_url: ""
    max_message_length: 4000

  # Multi-LLM profile pool.
  #
  # The old single `chatdome.ai` block is removed in the multi-LLM config model.
  # Select the default runtime model with active_ai_profile, and define every
  # available model under ai_profiles.
  active_ai_profile: ""

  ai_profiles: {}

  agent:
    # -------------------------------------------------------------------------
    # allow_generated_commands: The "Infinite Possibilities" Switch
    # -------------------------------------------------------------------------
    # When `false`: Restricted mode. ChatDome can ONLY use predefined
    #   safety audit commands from the loaded Command Packs.
    # When `true` (current default): Unlocks flexible host inspection. The LLM can dynamically
    #   write shell commands to fulfill your prompt (e.g. `ls`, `du`, `find`).
    #
    # Safety flow: dynamic commands are reviewed before execution. In restricted mode they
    #   still pass through the read-only validator and approval flow; if unrestricted mode is
    #   also enabled, static-safe read-only commands may run automatically, while risky,
    #   mutating, or deleting commands enter Human-in-the-loop confirmation.
    # -------------------------------------------------------------------------
    allow_generated_commands: true

    # -------------------------------------------------------------------------
    # allow_unrestricted_commands: The "God Mode" Switch
    # -------------------------------------------------------------------------
    # When `false`: AI-generated commands go through the safety
    #   validator (dangerous pattern blocklist + read-only allowlist).
    # When `true` (current default): Bypasses the command validator — no blocklist,
    #   no allowlist at the sandbox validation layer.
    #
    # ⚠️  WARNING: This is extremely dangerous. Only enable this if you fully
    #   trust the deployment context and understand the risks. The ToolDispatcher still
    #   performs a pre-execution review and sends risky/mutating/deleting commands to
    #   approval, but unrestricted execution removes the deterministic validator guardrail.
    #   This implicitly enables generated commands as well.
    # -------------------------------------------------------------------------
    allow_unrestricted_commands: true

    session_timeout: 600
    # Pending approval stage timeout (seconds). Keep this longer than
    # session_timeout so users can ask follow-up questions before deciding.
    pending_approval_timeout: 86400
    # Persisted session retention TTL (seconds). Memory sessions can expire
    # quickly, but context snapshots remain restorable until this TTL.
    # Set 0 to disable TTL cleanup for persisted snapshots.
    persisted_session_ttl: 604800
    max_rounds_per_turn: 10
    max_history_tokens: 16000
    command_timeout: 10
    max_output_chars: 4000
    # Debug/forensics only. When false, command stdout/stderr are not archived;
    # audit logs keep command metadata, byte counts, and output hashes only.
    # When true, outputs are written under chat_data/command_outputs/ with
    # retention/max-size limits. Obvious secret-reading commands are skipped.
    persist_command_outputs: false
    command_output_retention_days: 7
    command_output_max_chars: 8000

  # ---------------------------------------------------------------------------
  # Sentinel — 7×24 Security Monitoring (哨兵模式)
  # ---------------------------------------------------------------------------
  sentinel:
    enabled: true                         # 哨兵模式开关

    # 告警推送目标（空 = 使用 telegram.allowed_chat_ids；如果两者都为空，则 Sentinel 只巡检/记录，不会主动推送到手机）
    # 运行时可在 Telegram 中用自然语言或 /sentinel_mute、/sentinel_resume 暂停/恢复推送；
    # 静默状态保存在 chat_data/sentinel_alert_push_state.json，不影响巡检和历史记录。
    alert_chat_ids: []
    alert_retention_days: 30             # sentinel_alerts.jsonl 按天保留窗口

    # 推/拉分离 — 推送策略
    push_min_severity: 7                   # 数值 ≥ 7 (high) 才主动推送 Telegram
                                           # 低于此级别的告警静默记录，用户通过 /sentinel_status 查看

    # 命令库
    builtin_packs:                         # 启用的内置 pack（省略 = 全部加载）
      - ssh_auth
      - network
      - system_resources
      - processes_services
      - logs
      # - users_permissions                # 按需启用
      # - file_integrity
      # - containers
    # custom_packs_dir: "./packs"          # 用户自定义 pack 目录

    # 告警防护
    global_rate_limit: 10                  # 全局速率限制：每窗口最多推送 N 条
    global_rate_window: 300                # 速率窗口大小（秒）
    learning_rounds: 1                     # 冷启动静默轮数（首次启动建基线）

    # 检查策略列表
    checks:
      - name: "SSH 新访问来源检测"
        check_id: ssh_bruteforce
        interval: 300
        mode: differential
        severity: 6                        # medium（保留检查，不主动推送）
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "SSH 短时多次失败登录告警（3分钟）"
        check_id: ssh_failed_burst
        interval: 60
        mode: snapshot
        args:
          minutes: 3
          fallback_limit: 1000
          max_lines: 500
        severity: 8                        # high
        rule:
          type: line_count
          operator: ">="
          threshold: 10                    # 3 分钟内失败 >= 10 次触发

      - name: "SSH 持续失败登录告警（1小时）"
        check_id: ssh_failed_burst
        interval: 300
        mode: snapshot
        args:
          minutes: 60
          fallback_limit: 5000
          max_lines: 1000
        severity: 7                        # high
        rule:
          type: line_count
          operator: ">="
          threshold: 15                    # 1 小时内失败 >= 15 次触发

      - name: "SSH 成功登录告警"
        check_id: ssh_success_login
        interval: 60
        mode: differential
        args:
          limit: 200
        severity: 9                        # critical
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "SSH 异常时段成功登录告警"
        check_id: ssh_success_login_offhours
        interval: 60
        mode: differential
        args:
          since_hours: 24
          fallback_limit: 3000
          work_start_hour: 8               # 正常时段起始（含）
          work_end_hour: 23                # 正常时段结束（不含）
          limit: 200
        severity: 8                        # high
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "SSH 会话命令巡检"
        check_id: ssh_session_commands_patrol
        interval: 900                    # 每 15 分钟追踪活跃 SSH 会话命令增量
        mode: differential
        args:
          tracking_window_hours: 1        # 仅主动追踪登录后 1 小时内的会话
          limit: 50
        severity: 7                       # high
        rule:
          type: added_count
          operator: ">"
          threshold: 0

      - name: "磁盘使用率"
        check_id: disk_usage
        interval: 600
        mode: snapshot
        severity: 4                        # low
        rule:
          type: regex_extract
          pattern: '(\d+)%'
          aggregation: max
          operator: ">"
          threshold: 85

      - name: "新增监听端口"
        check_id: open_ports
        interval: 120
        mode: differential
        severity: 9                        # critical
        rule:
          type: line_count
          operator: ">"
          threshold: 0
