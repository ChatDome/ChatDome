# ChatDome Configuration
#
# This file contains NON-SENSITIVE settings only.
# All sensitive parameters (tokens, API keys) MUST be configured
# via environment variables — see README for details.
#
# Required environment variables:
#   CHATDOME_BOT_TOKEN        — Telegram Bot token
#   CHATDOME_AI_API_KEY       — LLM API key
#
# Optional environment variables:
#   CHATDOME_AI_BASE_URL      — LLM API base URL (default: https://api.openai.com/v1)
#   CHATDOME_AI_MODEL         — LLM model name (default: gpt-4o)
#   CHATDOME_ALLOWED_CHAT_IDS — Comma-separated Telegram Chat IDs (e.g. "123,456")

chatdome:
  telegram:
    # allowed_chat_ids: set via CHATDOME_ALLOWED_CHAT_IDS env var
    max_message_length: 4000

  ai:
    # base_url: set via CHATDOME_AI_BASE_URL env var, or override here
    # base_url: "https://api.openai.com/v1"
    model: "gpt-4o"
    temperature: 0.1
    max_tokens: 2000

  agent:
    # -------------------------------------------------------------------------
    # allow_generated_commands: The "Infinite Possibilities" Switch
    # -------------------------------------------------------------------------
    # When `false` (default): Strictly secure mode. ChatDome can ONLY use
    #   the ~15 predefined safety audit commands hardcoded in its codebase.
    # When `true`: Unlocks infinite potential. The LLM can dynamically write and run
    #   ANY shell command on your server to fulfill your prompt (e.g. `ls`, `du`, `find`).
    #
    # Safety Guarantee: Even when set to true, NO command runs automatically. 
    #   It goes through a strict AI Reviewer for impact assessment, and presents 
    #   a mandatory Human-in-the-loop dual-confirmation UI in Telegram. Safe commands
    #   require button approval; high-risk commands physically disable the 'Approve' 
    #   button, requiring an explicit `/confirm` text chat override.
    # -------------------------------------------------------------------------
    allow_generated_commands: false

    # -------------------------------------------------------------------------
    # allow_unrestricted_commands: The "God Mode" Switch
    # -------------------------------------------------------------------------
    # When `false` (default): AI-generated commands go through the safety
    #   validator (dangerous pattern blocklist + read-only allowlist).
    # When `true`: Bypasses ALL command validation — no blocklist, no allowlist.
    #   The AI can execute ANY command without restrictions.
    #
    # ⚠️  WARNING: This is extremely dangerous. Only enable this if you fully
    #   trust the AI and understand the risks. There is NO safety net.
    #   This implicitly enables generated commands as well.
    # -------------------------------------------------------------------------
    allow_unrestricted_commands: false

    session_timeout: 600
    # Pending approval stage timeout (seconds). Keep this longer than
    # session_timeout so users can ask follow-up questions before deciding.
    pending_approval_timeout: 86400
    # Persisted session retention TTL (seconds). Memory sessions can expire
    # quickly, but context snapshots remain restorable until this TTL.
    # Set 0 to disable TTL cleanup for persisted snapshots.
    persisted_session_ttl: 604800
    max_rounds_per_turn: 10
    max_history_tokens: 16000
    command_timeout: 10
    max_output_chars: 4000

  # Scheduled patrol (not yet implemented)
