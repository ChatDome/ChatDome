name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./controlplane pytest
      - name: Check Bash syntax
        run: bash -n chatdome install.sh scripts/start.sh
      - name: Run tests
        run: python -m pytest -q
        working-directory: controlplane
