name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: controlplane/pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./controlplane pytest build
      - name: Check Bash syntax
        run: bash -n chatdome install.sh scripts/start.sh
      - name: Dry-run install script
        run: sudo bash install.sh --dry-run
      - name: Run tests
        run: python -m pytest -q
        working-directory: controlplane
      - name: Check installed dependencies
        run: python -m pip check
      - name: Build Python package
        run: python -m build ./controlplane
